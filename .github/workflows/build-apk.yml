name: Build APK Android

on:
  push:
    branches: [main, master]
    paths:
      - 'biozar/web/**'
      - 'biozar-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Restaurer le keystore de signature
        shell: bash
        run: |
          if [ -f keystore-b64.txt ]; then
            echo "🔑 Décodage du keystore..."
            base64 -d keystore-b64.txt > biozar-app/android/app/biozar-release.keystore
            echo "✅ Keystore restauré dans android/app/ ("$(wc -c < biozar-app/android/app/biozar-release.keystore)" octets)"
          else
            echo "⚠️ keystore-b64.txt introuvable, utilisation du keystore local si existant"
          fi

      - name: 📦 Installer les dépendances
        run: npm install
        working-directory: biozar-app

      - name: 🔄 Copier les fichiers web
        run: npm run copy-web
        working-directory: biozar-app

      - name: 🔄 Sync Capacitor
        run: npx cap sync --verbose 2>&1
        working-directory: biozar-app

      - name: 🔧 Permissions Gradlew
        run: chmod +x gradlew
        working-directory: biozar-app/android

      - name: ✅ Vérifier les outils
        shell: bash
        run: |
          echo "☕ Java: $(java -version 2>&1 | head -1)"
          echo "🏗️  Gradle: $(cd biozar-app/android && ./gradlew --version 2>&1 | grep 'Gradle ' | head -1 || echo 'version inconnue')"
          echo "📱 ANDROID_HOME: ${ANDROID_HOME:-non défini}"

      - name: 🔨 Builder l'APK Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'biozar2026' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'biozar2026' }}
        run: cd biozar-app/android && ./gradlew assembleRelease --no-daemon

      - name: 📤 Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: biozar-app-release
          path: biozar-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: 📦 Publier sur GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: apk-latest
          name: BIOZAR APK (${{ github.sha }})
          body: |
            Dernier APK BIOZAR construit automatiquement.
            SHA : ${{ github.sha }}
            Date : ${{ github.event.head_commit.timestamp || 'now' }}
          artifacts: biozar-app/android/app/build/outputs/apk/release/app-release.apk
          artifactContentType: application/vnd.android.package-archive
          replacesArtifacts: true
          allowUpdates: true
          makesLatest: true
          draft: false
          prerelease: false
